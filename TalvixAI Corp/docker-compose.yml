version: '3.8'
services:
  talvix-ai-corp:
    build:
      context: ./server5
      dockerfile: Dockerfile
    container_name: talvix-server5-os
    restart: unless-stopped
    ports:
      - "3000:3000" # Exposes the Public 3D Frontend and Founder Control Panel
    # All secrets are injected dynamically via FluxCloud in production.
    # We do NOT use .env files for secrets.
    environment:
      - NODE_ENV=production
      - SERVER1_MCP_URL=http://server1-internal:8000/api/mcp/message
      # The following should be passed securely via FluxCloud runtime variables:
      # - TELEGRAM_BOT_TOKEN
      # - TELEGRAM_FOUNDER_ID
      # - CEREBRAS_API_KEY
      # - GROQ_API_KEY
      # - GEMINI_API_KEY
    networks:
      - talvix-internal

networks:
  talvix-internal:
    driver: bridge
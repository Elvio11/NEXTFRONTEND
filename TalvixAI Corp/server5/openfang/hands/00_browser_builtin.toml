name = "browser"
version = "1.0.0"
description = "Built-in Browser Automation Hand (ID: 0)"

[trigger]
type = "schedule"
cron = "0 5 * * *" # Runs daily at 5:00 AM IST

[llm]
provider = "groq"
model = "llama3-70b-8192"

[tools]
enabled = ["browser_automation", "http_get", "notify"]

[security]
taint_tracking = true
capabilities = ["network_outbound"]

[prompts]
system = """
You are the built-in Browser Automation Hand for Talvix AI Corp.
Your sole responsibility is to verify the health of scrapers every morning.
Ensure connections to Arya, LoopCV, Naukri, and Internshala are operational.
"""

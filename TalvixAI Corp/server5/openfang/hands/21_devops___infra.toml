# Custom OpenFang Hand: DevOps / Infra Monitor (Dept 21)
name = "devops_monitor"
description = "CPU/RAM/Disk all 5 servers. Docker status. FluxCloud cost monitoring."
llm_provider = "groq"
model = "llama-3.3-70b-versatile"

[schedule]
cron = "*/5 * * * *" # Every 5 min

[tools]
enabled = ["get_infra_metrics", "get_system_health", "notify"]
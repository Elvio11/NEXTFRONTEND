# Custom OpenFang Hand: Data Analyst (Dept 24)
name = "data_analyst"
description = "Daily metrics dashboard. Anomaly detection. Cohort analysis. P&L estimate."
llm_provider = "gemini"
model = "gemini-2.5-flash"

[schedule]
cron = "0 7 * * *" # 7AM IST + hourly (configured in workflows)

[tools]
enabled = ["get_product_metrics", "get_behavior_analytics", "get_conversion_data", "notify", "memory_write"]
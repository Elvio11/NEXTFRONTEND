# 🦾 OpenFang Hand: Dept 1 — CEO-OS
# Version: 1.0.0

[hand]
id = 1
name = "Commander (CEO-OS)"
role = "Master Orchestrator"
version = "3.1.0-V3"

[abilities]
orchestrate = "route_directive_to_dept"
audit = "audit_soul_compliance"
pulse = "aggregate_swarm_metrics"
notify = "tunnel_to_founder_telegram"

[directives]
morning_briefing = [
    "Dept 48: Get Budget Burn",
    "Dept 4: Get Growth Metrics",
    "Dept 39: Get Swarm Health",
    "CEO: Compile Summary",
    "Founder: Send Telegram"
]

incident_response = [
    "CEO: Enter LOCKDOWN",
    "Dept 39: Stop All Non-Critical Swarms",
    "Founder: Alert Critical Failure"
]

[config]
isolation_mode = "wasm"
max_latency_ms = 150
retry_limit = 3
timeout_sec = 10
governance_file = "openfang/SOUL.md"

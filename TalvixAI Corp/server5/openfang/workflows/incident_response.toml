# Workflow: Incident Response (Conditional Branching)
# Triggers from POST /internal/founder-notify (Server 1)
name = "incident_response"
description = "Triages system alerts. Routes to Support L2, Engineering Commander, or Devops."

[trigger]
event = "server1_webhook"
schema = "{ event_type, severity, details, timestamp }"

[pipeline]
mode = "conditional"

[[pipeline.branches]]
condition = "severity == 'critical'"
hands = ["devops_monitor"]
action = "immediate_founder_alert"

[[pipeline.branches]]
condition = "event_type == 'agent_failure'"
hands = ["engineering_commander"] # Triggers Ruflo swarm
action = "create_github_issue"

[[pipeline.branches]]
condition = "event_type == 'whatsapp_disconnect'"
hands = ["support_l1"]
action = "notify_founder"
# Workflow: Content Pipeline (Sequential)
# Triggers on Monday mornings to stage the week's content.
name = "content_pipeline"
description = "Drafts, designs, and schedules marketing material."

[trigger]
cron = "0 8 * * 1" # Monday 8AM IST

[pipeline]
mode = "sequential"
# Hand off sequence
steps = [
    { name = "marketing_director", action = "generate_strategy_brief" },
    { name = "seo_specialist", action = "optimize_keywords", input_from = "marketing_director" },
    { name = "content_writer", action = "draft_posts", input_from = "seo_specialist" },
    { name = "visual_designer", action = "generate_assets", input_from = "content_writer" }
]

[output]
target = "commander"
action = "request_founder_approval" # Human in the loop constraint
next = "distribution_manager" # Buffer scheduling occurs ONLY after approval
name = "Morning Briefing Pipeline"
version = "1.0.0"
description = "Commander's 7AM status sync workflow"

[trigger]
type = "schedule"
cron = "0 7 * * *" # Daily at 7:00 AM IST

[workflow]
mode = "fan_out"
timeout = 300

[workflow.nodes]
# Parallel execution of 6 analytical departments
depts = [24, 33, 21, 14, 12, 25]

[workflow.aggregation]
type = "proof_of_life"
target_agent = "commander_ceo"

[workflow.aggregation.template]
body = """
MORNING BRIEFING - TALVIX AI CORP
- Active Users: {{dept_24_result}}
- Razorpay Net: {{dept_33_result}}
- Infra Health: {{dept_21_result}}
- Churn Risk: {{dept_14_result}}
- Distributions: {{dept_12_result}}
- Competitor Updates: {{dept_25_result}}
"""
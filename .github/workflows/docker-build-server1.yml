name: Build and Push Server 1 Docker Image

on:
  push:
    branches:
      - deploy-server1

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB2_USERNAME }}
          password: ${{ secrets.DOCKERHUB2_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB2_USERNAME }}/talvix2-server1:latest
            ${{ secrets.DOCKERHUB2_USERNAME }}/talvix2-server1:${{ github.sha }}

name: Build and Push Server 2 Docker Image

on:
  push:
    branches:
      - deploy-server2

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB1_USERNAME }}
          password: ${{ secrets.DOCKERHUB1_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB1_USERNAME }}/talvixserver2:latest
            ${{ secrets.DOCKERHUB1_USERNAME }}/talvixserver2:${{ github.sha }}
